name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  MOM_PORTABLE_BUILD: "1"
  WINDOWS_ONEAPI_URL: https://raw.githubusercontent.com/oneapi-src/oneapi-ci/master/.github/workflows/build_all.yml
  WINDOWS_ONEAPI_PACKAGE: intel-oneapi-toolkit
  WINDOWS_DPCPP_COMPONENTS: intel.oneapi.win.cpp-dpcpp-common
  ONEAPI_ROOT: C:/Program Files (x86)/Intel/oneAPI

jobs:
  build-linux-x64:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.15.0
          package-manager-cache: false

      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/local/.ghcup \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /opt/hostedtoolcache/go \
            /opt/hostedtoolcache/Python \
            /opt/hostedtoolcache/Ruby \
            /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk
          docker system prune --all --force || true
          df -h

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build native addon in release image
        run: ./r.sh node -e "console.log('mom build ready')"

      - name: Package release archive
        run: .github/workflows/scripts/package-linux.sh

      - name: Test release archive
        run: |
          set -euo pipefail
          archive="$(find . -maxdepth 1 -name 'mom-*-lin.tgz' -print -quit)"
          .github/workflows/scripts/test-release-linux.sh "$archive"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: mom-lin
          path: mom-*-lin.tgz

  build-linux-nvidia-x64:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.15.0
          package-manager-cache: false

      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/local/.ghcup \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /opt/hostedtoolcache/go \
            /opt/hostedtoolcache/Python \
            /opt/hostedtoolcache/Ruby \
            /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk
          docker system prune --all --force || true
          df -h

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      # DPC++ CUDA-backend build: AOT to PTX/SASS, so no GPU is needed at build time.
      # The build is CUDA-only (no CPU SYCL device) and CI runners have no NVIDIA GPU,
      # so the SYCL/GPU algos are verified on real NVIDIA hardware, not in CI.
      - name: Build native addon in NVIDIA (DPC++ CUDA) image
        run: ./r-nvidia.sh node -e "console.log('mom nvidia build ready')"

      - name: Package release archive
        run: .github/workflows/scripts/package-linux-nvidia.sh

      - name: Test release archive (CPU)
        # Only the pure-CPU (xmrig) suite runs here (see build step above for why).
        run: |
          set -euo pipefail
          archive="$(find . -maxdepth 1 -name 'mom-*-lin-nvidia.tgz' -print -quit)"
          .github/workflows/scripts/test-release-linux.sh "$archive" cpu

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: mom-lin-nvidia
          path: mom-*-lin-nvidia.tgz

  build-windows-x64:
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.15.0
          package-manager-cache: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Use oneAPI installation cache
        uses: actions/cache@v5
        id: cache-oneapi
        with:
          path: |
            ${{ env.ONEAPI_ROOT }}
            C:/Program Files/Microsoft Visual Studio/2022/Enterprise/MSBuild/Microsoft/VC/v170/Platforms/*/PlatformToolsets/Intel*
            C:/Program Files/Microsoft Visual Studio/2022/Enterprise/MSBuild/Microsoft/VC/v170/BuildCustomizations/Intel*
            C:/Program Files/Microsoft Visual Studio/2022/Enterprise/MSBuild/Microsoft/VC/v170/Intel*.dll
          key: oneapi-windows-2026.0.0-toolkit-dpcpp-online-v3

      - name: Install Intel oneAPI
        if: steps.cache-oneapi.outputs.cache-hit != 'true'
        shell: cmd
        run: .github\workflows\scripts\install-oneapi.bat "%WINDOWS_ONEAPI_URL%" "%WINDOWS_DPCPP_COMPONENTS%" "%WINDOWS_ONEAPI_PACKAGE%"

      - name: Build native addon
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .github\workflows\scripts\build-windows.ps1

      - name: Package release archive
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .github\workflows\scripts\package-windows.ps1

      - name: Install Intel OpenCL CPU runtime
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .github\workflows\scripts\install-opencl-runtime-windows.ps1

      - name: Test release archive
        shell: powershell
        run: |
          $archive = Get-ChildItem . -Filter "mom-*-win.zip" | Select-Object -First 1
          powershell -NoProfile -ExecutionPolicy Bypass -File .github\workflows\scripts\test-release-windows.ps1 -Archive $archive.FullName

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: mom-win
          path: mom-*-win.zip

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-linux-x64
      - build-linux-nvidia-x64
      - build-windows-x64
    runs-on: ubuntu-24.04

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find artifacts -type f -print0)
          meta=(--repo "${GITHUB_REPOSITORY}" --title "${GITHUB_REF_NAME}" --notes "mom ${GITHUB_REF_NAME}")
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            # Release already exists (e.g. a re-run): refresh metadata, then overwrite assets.
            gh release edit "${GITHUB_REF_NAME}" "${meta[@]}"
            gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${files[@]}" "${meta[@]}"
          fi
