name: Stability

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stability-${{ github.ref }}
  cancel-in-progress: true

env:
  MOM_PORTABLE_BUILD: "1"
  WINDOWS_ONEAPI_URL: https://raw.githubusercontent.com/oneapi-src/oneapi-ci/master/.github/workflows/build_all.yml
  WINDOWS_ONEAPI_PACKAGE: intel-oneapi-toolkit
  WINDOWS_DPCPP_COMPONENTS: intel.oneapi.win.cpp-dpcpp-common
  ONEAPI_ROOT: C:/Program Files (x86)/Intel/oneAPI

jobs:
  package-linux-x64:
    name: Ubuntu / package
    runs-on: ubuntu-24.04
    # Unified dual-compiler build in a large (oneAPI + nightly DPC++ + CUDA) image.
    timeout-minutes: 150

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.15.0
          package-manager-cache: false

      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/local/.ghcup \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /opt/hostedtoolcache/go \
            /opt/hostedtoolcache/Python \
            /opt/hostedtoolcache/Ruby \
            /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk
          docker system prune --all --force || true
          df -h

      # Exercise the bundled Linux setup script so apt-package rot is caught in CI. install.sh
      # auto-detects GPU vendors and defaults to the Intel runtime on a GPU-less runner.
      - name: Verify Linux install scripts
        run: |
          set -euo pipefail
          bash -n scripts/install.sh
          sudo bash scripts/install.sh

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ONE unified mom.node for both Intel and NVIDIA GPUs (dual-compiler combined build).
      - name: Build native addon in release image
        run: ./r.sh node -e "console.log('mom build ready')"

      - name: Package release archive
        run: .github/workflows/scripts/package-linux-combined.sh

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: mom-lin-package
          path: mom-*-lin.tgz

  test-linux-x64:
    name: Ubuntu / ${{ matrix.suite }}
    needs: package-linux-x64
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # No GitHub-hosted runner has a GPU, so the `gpu` suite is verified on real
        # hardware locally (`npm test` on a GPU box runs cpu + sycl-cpu + gpu). CI runs
        # the two suites that work on a CPU-only runner: xmrig CPU and the SYCL CPU device.
        suite:
          - cpu
          - sycl-cpu

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.15.0
          package-manager-cache: false

      - name: Download package
        uses: actions/download-artifact@v7
        with:
          name: mom-lin-package
          path: dist

      - name: Test extracted package
        run: |
          set -euo pipefail
          archive="$(find dist -name 'mom-*-lin.tgz' -print -quit)"
          .github/workflows/scripts/test-release-linux.sh "$archive" "${{ matrix.suite }}"

  package-windows-x64:
    name: Windows / package
    runs-on: windows-2022
    # icx build with /Qipo whole-program IPO at link needs more than the old 90.
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.15.0
          package-manager-cache: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Use oneAPI installation cache
        uses: actions/cache@v5
        id: cache-oneapi
        with:
          path: |
            ${{ env.ONEAPI_ROOT }}
            C:/Program Files/Microsoft Visual Studio/2022/Enterprise/MSBuild/Microsoft/VC/v170/Platforms/*/PlatformToolsets/Intel*
            C:/Program Files/Microsoft Visual Studio/2022/Enterprise/MSBuild/Microsoft/VC/v170/BuildCustomizations/Intel*
            C:/Program Files/Microsoft Visual Studio/2022/Enterprise/MSBuild/Microsoft/VC/v170/Intel*.dll
            C:/Program Files/Microsoft Visual Studio/2022/Enterprise/Common7/IDE/PublicAssemblies/Intel*
          # v5-icx: the mom target uses the classic "Intel C++ Compiler" toolset, whose MSBuild task loads
          # Intel.1ACompiler.* from VS's Common7/IDE/PublicAssemblies (installed by the oneAPI VS
          # integration) -- the previous cache paths dropped them, so the cached build failed ICXMultiToolTask.
          key: oneapi-windows-2026.0.0-toolkit-dpcpp-online-v5-icx

      - name: Install Intel oneAPI
        if: steps.cache-oneapi.outputs.cache-hit != 'true'
        shell: cmd
        run: .github\workflows\scripts\install-oneapi.bat "%WINDOWS_ONEAPI_URL%" "%WINDOWS_DPCPP_COMPONENTS%" "%WINDOWS_ONEAPI_PACKAGE%"

      - name: Build native addon
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .github\workflows\scripts\build-windows.ps1

      - name: Package release archive
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .github\workflows\scripts\package-windows.ps1

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: mom-win-package
          path: mom-*-win.zip

  test-windows-x64:
    name: Windows / ${{ matrix.suite }}
    needs: package-windows-x64
    runs-on: windows-2022
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # No GitHub-hosted runner has a GPU, so the `gpu` suite is verified on real
        # hardware locally. CI runs the two suites that work on a CPU-only runner:
        # xmrig CPU and the SYCL CPU device (Intel OpenCL CPU runtime).
        suite:
          - cpu
          - sycl-cpu

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.15.0
          package-manager-cache: false

      - name: Download package
        uses: actions/download-artifact@v7
        with:
          name: mom-win-package
          path: dist

      # Set up the runtime with the SAME scripts/install.ps1 users run (dogfoods it), pinning the
      # OpenCL CPU runtime URL for a deterministic CI download.
      - name: Install Intel OpenCL CPU runtime
        if: matrix.suite == 'sycl-cpu'
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\install.ps1 -OpenClRuntimeUrl "https://registrationcenter-download.intel.com/akdlm/IRC_NAS/ad824c04-01c8-4ae5-b5e8-164a04f67609/w_opencl_runtime_p_2025.3.1.762.exe"

      - name: Test extracted package
        shell: powershell
        timeout-minutes: 20
        env:
          MOM_SYCL_CPU_SMOKE: ${{ matrix.suite == 'sycl-cpu' && '1' || '' }}
        run: |
          $archive = Get-ChildItem dist -Filter "mom-*-win.zip" | Select-Object -First 1
          powershell -NoProfile -ExecutionPolicy Bypass -File .github\workflows\scripts\test-release-windows.ps1 -Archive $archive.FullName -Suite "${{ matrix.suite }}"
